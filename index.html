<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos</title>
   <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <to-do-app></to-do-app>
    </div>

<template id="toDoApp">
    <link rel="stylesheet" href="./to-do-app.css">
    <h1>Todos</h1>
    <form>
        <input type="text" placeholder="Add a new to do"></input>
        <button type="submit">Add</button>
    </form>
    
    <ul id="todos"></ul>
</template>

<template id="toDoItem">
    <link rel="stylesheet" href="./to-do-item.css">
    <div>
        <li class="item">
            <input type="checkbox">
            <label></label>
            <button>❌</button>
        </li>
    </div>
</template>
<script type="module" src="./index.js"></script>
</body>
</html>
